# OPCP Introduction Skillhub - Docker Deployment nginx Configuration
#
# This configuration serves the static skillhub content from within
# the Docker container. All assets are self-contained in the image;
# no runtime network fetches are required.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Logging
    access_log /var/log/nginx/skillhub_access.log;
    error_log /var/log/nginx/skillhub_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # MIME types (included from nginx default mime.types)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Static asset caching (CSS, JS, images, fonts)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files - no caching to ensure users always get fresh content
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # JSON files (search index) - short cache
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Main location block - serve static files
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Custom 404 error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Deny access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~* \.(bak|swp|old|orig)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
